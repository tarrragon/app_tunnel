name: CI

on:
  push:
  pull_request:

jobs:
  server:
    name: server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -count=1
      - name: build (darwin + linux)
        run: |
          GOOS=darwin GOARCH=arm64 go build ./...
          GOOS=linux GOARCH=amd64 go build ./...
