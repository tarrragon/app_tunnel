# version-release CLI 專案配置（0.19.0-W1-127）
#
# 本專案為 all-on-main 工作流：所有變更直接 commit 到 main，無 feature 分支；
# tag 慣例為 plain v{version}（既有 v0.18.0 / v0.17.4 皆無 -final 後綴）；
# worklog 採巢狀路徑 docs/work-logs/v0/v0.19/v0.19.0/。
#
# 放於 .claude/（branch-verify 豁免路徑），使 all-on-main 工作流可直接
# commit 到 main 而不被保護分支 hook 阻擋。version_release.py 的
# load_version_release_config() 會在 <root> 與 <root>/.claude/ 兩處查找
# （root 優先），故本檔位置受支援。
#
# 未列出的欄位（versions / sync_rules / detection / preflight_checks）
# 由 DEFAULT_VERSION_RELEASE_CONFIG 提供預設值。

# 專案類型：monorepo（app/ Flutter + server/ Go），但發版以單一版本號管理
# 整個產品（tag v{version}），版本源取 app/pubspec.yaml（server 為 tag-driven）。
# 故 project_type 設 flutter、版本源明指 app/pubspec.yaml，而非 monorepo 子專案模型。
project_type: flutter

# 版本源：app/pubspec.yaml 為產品版本 SoT（與 git tag v{version} 一致）
#
# 注意 pubspec.yaml 版本含 Flutter build-number 後綴（如 1.1.0+2，+2 為 build
# number）。version_release.py 偵測時會自動剝離 +build 後綴取核心版本（1.1.0）。
#
# in-dev 覆寫：pubspec build 版可能落後開發中版本（worklog 已建 v{version} 子目錄、
# pubspec 尚未 bump）。此時 detect_version() 比較 worklog 偵測到的最高 in-dev 版本
# 與版本源版本，採較高者為目標，避免誤把落後的 build 版當發版目標。
#
# server/（Go）無獨立版本檔，採 tag-driven（與產品 tag v{version} 同步），
# 故不在 version_source 列出；整個 monorepo 以單一產品版本號發版。
version_source:
  primary: app/pubspec.yaml
  parser: yaml

# 發布工作流：trunk = all-on-main，跳過 feature-branch merge 與分支清理
release_workflow: trunk

# tag 命名：plain v{version}（無 -final 後綴）
tag_format: "v{version}"

# worklog 巢狀路徑範本（與 ticket CLI 的 v{major}/v{major_minor}/v{version} 一致）
# 註：先前此值為扁平 "docs/work-logs/v{version}"，與 ticket CLI 的巢狀放置不符，
# 導致 version-release preflight 找不到 worklog。改為巢狀對齊兩工具。
worklog_path_pattern: "docs/work-logs/v{major}/v{major_minor}/v{version}"
