publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  mobile_scanner: ^7.0.1
  web_socket_channel: ^3.0.2
  go_router: ^15.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
